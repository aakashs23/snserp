name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      # The suite never opens a socket: the DB engine is lazy and every
      # Supabase/AI call is faked. These only need to be syntactically valid,
      # because supabase-py's create_client() rejects an empty URL at import.
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_KEY: dummy-service-key
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/snserp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    env:
      # next build inlines NEXT_PUBLIC_* at build time. These are the public
      # anon values, not secrets, but Actions does not read .env.local.
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Reports only. `main` currently has 8 pre-existing eslint errors (mostly
      # no-explicit-any, plus a "Cannot create components during render" on the
      # dashboard page). Flip this to blocking once those are cleared.
      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
